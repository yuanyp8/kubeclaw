app_name: "kubeclaw"
env: "development"
app_version: "1.0.0"

# 日志配置
log_level: "debug"          # debug, info, warn, error
log_encoding: "console"    # console 或 json
log_development: true      # 开发模式下输出更友好的格式

# HTTP 服务配置
http_addr: ":8080"                         # 监听地址，:8080 表示所有接口的 8080 端口
read_timeout: "5s"                         # 读取超时
write_timeout: "10s"                       # 写入超时
shutdown_timeout: "30s"                    # 优雅关闭超时

# JWT 与加密配置（生产环境请务必通过环境变量覆盖）
jwt_secret: "change-me-in-production"      # JWT 签名密钥，至少 32 字符
data_secret: "change-me-in-production"     # 数据加密密钥
access_token_ttl: "15m"                    # 访问令牌有效期
refresh_token_ttl: "720h"                  # 刷新令牌有效期（30天）

# 初始管理员账户（生产环境请使用环境变量覆盖）
bootstrap_admin_username: "admin"
bootstrap_admin_email: "admin@example.com"
bootstrap_admin_password: "admin123456"       # 生产环境务必修改或通过环境变量注入

# 系统租户信息
system_tenant_name: "System"
system_tenant_slug: "system"

# MySQL 数据库配置
mysql_host: "36.138.61.152"
mysql_port: 30036
mysql_user: "root"
mysql_password: "passw0rd"                         # 生产环境请通过环境变量设置
mysql_database: "opsbrain"
mysql_charset: "utf8mb4"
mysql_parse_time: true
mysql_max_open_conns: 25
mysql_max_idle_conns: 10
mysql_conn_max_lifetime: "5m"
mysql_auto_migrate: true                  # 生产环境建议设为 false，手动管理迁移